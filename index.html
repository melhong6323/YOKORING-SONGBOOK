<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>요코링 홈 & 노래책</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root {
    --bg-yogurt-cream: #FFFAFA;      
    --bg-yogurt-strawberry: #FFE6EA; 
    --bg-card: #ffffff;      
    --bg-inner: #FFF1F3;      
    --accent: #ff8ead;       
    --accent-soft: rgba(255, 142, 173, 0.1);
    --border-color: rgba(93, 60, 67, 0.05);
    --text-main: #5D3C43;    
    --text-sub: #9A8A8C;     
    --nav-height: 70px;
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Pretendard', sans-serif !important; }

body {
    margin: 0; 
    background: linear-gradient(135deg, var(--bg-yogurt-cream) 0%, var(--bg-yogurt-strawberry) 100%);
    color: var(--text-main); 
    height: 100vh; 
    overflow: hidden;
    cursor: url('cursor-basic.png') 10 10, auto; 
}

a, button, .tab, .song, .copy-icon, .video-wrap, .menu-toggle {
    cursor: url('cursor-pointer.png') 10 10, pointer !important;
}

/* 1. Navbar */
.navbar {
    display: flex; align-items: center; padding: 0 40px; height: var(--nav-height);
    background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%);
    position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.60);
    box-shadow: 0 1px 20px rgba(255, 142, 173, 0.08);
}
.nav-logo { font-size: 20px; font-weight: 800; color: var(--text-main); flex-shrink: 0; }
.nav-logo span { color: var(--accent); }
.nav-menu { display: flex; gap: 20px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-item { font-weight: 700; font-size: 15px; cursor: pointer; color: var(--text-sub); padding: 8px 16px; border-radius: 10px; transition: 0.3s; }
.nav-item.active { color: var(--accent); background: var(--accent-soft); }
.menu-toggle { display: none; font-size: 26px; cursor: pointer; color: var(--text-main); position: absolute; left: 20px; z-index: 1001; }

/* 2. Main Layout */
main { margin-top: var(--nav-height); height: calc(100vh - var(--nav-height)); overflow: hidden; }
.page { display: none; padding: 20px; height: 100%; overflow-y: auto; animation: fadeIn 0.4s ease-out; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* 3. Home Page */
.home-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 40px; }

.hero-section {
    position: relative;
    padding: 60px 40px 70px;
    text-align: center;
    border-radius: 30px;
    overflow: visible;
    background-color: transparent;
    background-image:
        radial-gradient(circle at 15% 20%, rgba(255, 142, 173, 0.22) 0%, transparent 55%),
        radial-gradient(circle at 85% 80%, rgba(255, 142, 173, 0.18) 0%, transparent 55%),
        radial-gradient(circle at 70% 25%, rgba(255, 200, 220, 0.16) 0%, transparent 65%),
        radial-gradient(circle at 30% 75%, rgba(255, 200, 220, 0.14) 0%, transparent 65%),
        radial-gradient(circle at 50% 50%, rgba(255, 230, 234, 0.80) 0%, transparent 85%),
        radial-gradient(circle at 20% 60%, rgba(255, 230, 234, 0.70) 0%, transparent 85%),
        radial-gradient(circle at 80% 40%, rgba(255, 230, 234, 0.65) 0%, transparent 85%);
    box-shadow: 0 20px 60px rgba(255, 142, 173, 0.13), 0 4px 16px rgba(93, 60, 67, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.85);
}

/* Animated gradient layer (overflow clipped inside) */
.hero-section-bg {
    position: absolute;
    inset: 0;
    border-radius: 30px;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}
.hero-section-bg::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 142, 173, 0.10) 0%, transparent 60%),
        radial-gradient(circle at 90% 80%, rgba(255, 142, 173, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 70% 30%, rgba(255, 250, 250, 0.12) 0%, transparent 70%),
        radial-gradient(circle at 30% 70%, rgba(255, 250, 250, 0.10) 0%, transparent 70%),
        radial-gradient(circle at 50% 50%, rgba(255, 230, 234, 0.75) 0%, transparent 90%),
        radial-gradient(circle at 20% 60%, rgba(255, 230, 234, 0.65) 0%, transparent 90%),
        radial-gradient(circle at 80% 40%, rgba(255, 230, 234, 0.55) 0%, transparent 90%);
    animation: floatGradient 15s infinite ease-in-out alternate;
    will-change: transform;
}

@keyframes floatGradient {
    0% { transform: translate(-5%, -5%) scale(1); }
    50% { transform: translate(5%, 5%) scale(1.05); }
    100% { transform: translate(-5%, -5%) scale(1); }
}

/* Hub layout — profile center + orbital icons */
.hero-hub {
    position: relative;
    z-index: 1;
    width: 620px;
    height: 500px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero-center {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.profile-img {
    width: 230px; height: 230px;
    border-radius: 50%; border: 5px solid #fff;
    margin: 0 auto 18px;
    background: #fff url('yoko-profile.png') center/cover;
    box-shadow:
        0 0 0 10px rgba(255, 142, 173, 0.10),
        0 0 0 20px rgba(255, 142, 173, 0.05),
        0 14px 40px rgba(255, 142, 173, 0.30);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.profile-img:hover {
    transform: scale(1.04);
    box-shadow:
        0 0 0 12px rgba(255, 142, 173, 0.15),
        0 0 0 24px rgba(255, 142, 173, 0.07),
        0 20px 55px rgba(255, 142, 173, 0.40);
}

.hero-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
.hero-title span { color: var(--accent); }
.hero-desc { font-weight: 600; font-size: 15px; opacity: 0.75; margin-bottom: 0; }
.mobile-btn-area { display: none; margin-top: 18px; }
.btn-go-songbook { padding: 14px 34px; background: var(--accent); color: white; border: none; border-radius: 50px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 142, 173, 0.35); transition: transform 0.2s ease, box-shadow 0.2s ease; }
.btn-go-songbook:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255, 142, 173, 0.45); }

/* Mobile icon grid (shown only on mobile) */
.mobile-icon-grid { display: none; }

/* === ORBITAL ICONS === */
.vp-icon {
    position: absolute;
    text-decoration: none;
    z-index: 3;
}
.vp-pos-top-left  { top: 15px;  left: 5px; }
.vp-pos-top-right { top: 15px;  right: 5px; }
.vp-pos-left      { top: 50%;   left: -5px; transform: translateY(-50%); }
.vp-pos-bottom-left  { bottom: 15px; left: 5px; }
.vp-pos-bottom-right { bottom: 15px; right: 5px; }

/* Vision Pro glassmorphism face */
.vp-icon-face {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 105px;
    padding: 16px 10px 13px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.52);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.72);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -1px 0 rgba(255, 255, 255, 0.30),
        0 8px 24px rgba(93, 60, 67, 0.12),
        0 4px 12px rgba(255, 142, 173, 0.10);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.vp-icon-face img { width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(93, 60, 67, 0.15)); }
.vp-icon-face span { font-size: 11px; font-weight: 700; color: var(--text-main); text-align: center; line-height: 1.3; white-space: nowrap; }

.vp-icon:hover .vp-icon-face {
    transform: translateY(-7px) scale(1.06);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.98),
        inset 0 -1px 0 rgba(255, 255, 255, 0.35),
        0 18px 44px rgba(93, 60, 67, 0.16),
        0 8px 20px rgba(255, 142, 173, 0.20);
    animation-play-state: paused;
}
.vp-icon:active .vp-icon-face { transform: translateY(-2px) scale(0.97); }

/* Per-icon color tints */
.vp-soop    { background: rgba(165, 223, 249, 0.32) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -1px 0 rgba(255,255,255,0.30), 0 8px 24px rgba(93,60,67,0.10), 0 4px 14px rgba(165,223,249,0.28) !important; }
.vp-youtube { background: rgba(255, 180, 180, 0.30) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -1px 0 rgba(255,255,255,0.30), 0 8px 24px rgba(93,60,67,0.10), 0 4px 14px rgba(255,100,100,0.20) !important; }
.vp-rewatch { background: rgba(220, 220, 220, 0.36) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -1px 0 rgba(255,255,255,0.30), 0 8px 24px rgba(93,60,67,0.10), 0 4px 14px rgba(180,180,180,0.20) !important; }
.vp-cafe    { background: rgba(195, 238, 195, 0.32) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -1px 0 rgba(255,255,255,0.30), 0 8px 24px rgba(93,60,67,0.10), 0 4px 14px rgba(100,200,100,0.20) !important; }
.vp-discord { background: rgba(180, 190, 255, 0.30) !important; box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -1px 0 rgba(255,255,255,0.30), 0 8px 24px rgba(93,60,67,0.10), 0 4px 14px rgba(114,137,218,0.24) !important; }

.vp-icon:hover .vp-soop    { box-shadow: inset 0 1px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(255,255,255,0.35), 0 18px 44px rgba(93,60,67,0.14), 0 8px 24px rgba(165,223,249,0.50) !important; }
.vp-icon:hover .vp-youtube { box-shadow: inset 0 1px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(255,255,255,0.35), 0 18px 44px rgba(93,60,67,0.14), 0 8px 24px rgba(255,100,100,0.42) !important; }
.vp-icon:hover .vp-rewatch { box-shadow: inset 0 1px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(255,255,255,0.35), 0 18px 44px rgba(93,60,67,0.14), 0 8px 24px rgba(180,180,180,0.40) !important; }
.vp-icon:hover .vp-cafe    { box-shadow: inset 0 1px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(255,255,255,0.35), 0 18px 44px rgba(93,60,67,0.14), 0 8px 24px rgba(100,200,100,0.44) !important; }
.vp-icon:hover .vp-discord { box-shadow: inset 0 1px 0 rgba(255,255,255,0.98), inset 0 -1px 0 rgba(255,255,255,0.35), 0 18px 44px rgba(93,60,67,0.14), 0 8px 24px rgba(114,137,218,0.48) !important; }

/* Idle float animations (staggered) */
@keyframes iconFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-6px); }
}
.vp-pos-top-left     .vp-icon-face { animation: iconFloat 4.0s ease-in-out infinite; animation-delay: 0.0s; }
.vp-pos-top-right    .vp-icon-face { animation: iconFloat 4.2s ease-in-out infinite; animation-delay: 0.5s; }
.vp-pos-left         .vp-icon-face { animation: iconFloat 3.8s ease-in-out infinite; animation-delay: 1.0s; }
.vp-pos-bottom-left  .vp-icon-face { animation: iconFloat 4.5s ease-in-out infinite; animation-delay: 0.3s; }
.vp-pos-bottom-right .vp-icon-face { animation: iconFloat 4.1s ease-in-out infinite; animation-delay: 0.8s; }

.latest-video { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 28px 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.75); box-shadow: 0 8px 32px rgba(93, 60, 67, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.9); }
.video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.video-wrap { position: relative; padding-bottom: 56.25%; border-radius: 15px; overflow: hidden; cursor: pointer; background: #000; }
.yt-thumb { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
.yt-play-btn { 
    position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:60px; height:60px; 
    background:rgba(0,0,0,0.6); color:#fff; border-radius:50%; display:flex; justify-content:center; 
    align-items:center; font-size:24px; z-index: 2; transition: 0.3s;
}
.video-wrap:hover .yt-play-btn { background: var(--accent); transform: translate(-50%, -50%) scale(1.1); }

/* 5. Songbook Page */
.songbook-container { display: flex; gap: 20px; max-width: 1500px; margin: 0 auto; height: 100%; }
.left-pane { flex: 0 0 320px; display: flex; flex-direction: column; gap: 16px; height: 100%; transition: 0.3s ease; position: relative; }
.right-pane { flex: 1; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(93, 60, 67, 0.05); }
.sidebar-close { display: none; position: absolute; top: 15px; right: 15px; font-size: 26px; cursor: pointer; color: var(--text-sub); z-index: 10; padding: 5px; }

.glass-card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.75);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.90), 0 8px 32px rgba(93, 60, 67, 0.07);
}
.tab-group { display: flex; flex-wrap: wrap; gap: 6px; }
.tab { padding: 7px 12px; border-radius: 10px; background: var(--bg-inner); color: var(--text-sub); cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s ease; }
.tab.active { background: linear-gradient(135deg, #ff8ead 0%, #ffb3c8 100%); color: white; border: none; box-shadow: 0 4px 14px rgba(255, 142, 173, 0.40); }

#guide { 
    flex: 1; 
    overflow-y: auto; 
    font-size: 13px; 
    color: var(--text-sub); 
    line-height: 1.8; 
    padding: 20px; 
    text-align: left; 
    font-weight: 400 !important; 
}
#artistList { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 250px; overflow-y: auto; scroll-behavior: smooth; }
#artistList .tab { text-align: center; font-size: 11px; padding: 6px 2px; border-radius: 20px; }
#artistList .tab:hover { background: rgba(255, 142, 173, 0.15); color: var(--accent); }
#artistList .tab.active { background: linear-gradient(135deg, #ff8ead, #ffb3c8); color: white; box-shadow: 0 3px 10px rgba(255, 142, 173, 0.35); border: none; }

.list-header { padding: 15px 20px; background: rgba(255, 255, 255, 0.80); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 16px rgba(93, 60, 67, 0.04); }
#searchInput { flex: 1; background: var(--bg-inner); border: 1.5px solid var(--border-color); border-radius: 14px; padding: 12px 18px; outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease; }
#searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255, 142, 173, 0.20); background: #fff; }
.reset-btn { flex-shrink: 0; height: 45px; padding: 0 15px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); border-radius: 14px; font-size: 11px; font-weight: 800; cursor: pointer; }

#list { flex: 1; overflow-y: auto; }

.song {
    display: flex; align-items: center; padding: 14px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    border-left: 3px solid transparent;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
}
.song:hover { background: var(--accent-soft); border-left-color: var(--accent); transform: translateX(3px); }
.song:active { background: rgba(255, 142, 173, 0.2); }

.artist-name { 
    width: 190px;            
    margin-right: 25px;    
    flex-shrink: 0; 
    font-weight: 600; 
    color: var(--text-sub); 
    font-size: 13px; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
}

.song-title { 
    flex: 1; 
    min-width: 0; 
    color: var(--text-main); 
    font-size: 14px; 
    font-weight: 500; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    padding-right: 15px; 
}

.song-info-tags { 
    display: flex; 
    gap: 8px; 
    align-items: center; 
    width: 220px; 
    flex-shrink: 0; 
    justify-content: flex-end; 
    margin-right: 15px;
}

.note-text { 
    font-size: 13px; 
    font-weight: 700; 
    color: #5D3C43 !important;   
    background: #f0ede5 !important; 
    padding: 2px 8px; 
    border-radius: 5px;
    border: 1px solid rgba(93, 60, 67, 0.1) !important;
    white-space: nowrap;
    display: inline-block;
    opacity: 1;
}

.key-badge { 
    font-size: 13px; 
    font-weight: 700; 
    color: #777777 !important;   
    background: none !important;  
    border: none !important;      
    padding: 0 !important;        
    white-space: nowrap;
}

.keyup-badge { 
    font-size: 13px; 
    font-weight: 700; 
    color: #ff8ead !important; 
    background: rgba(255, 142, 173, 0.1) !important; 
    padding: 2px 8px; 
    border-radius: 5px; 
    border: 1px solid #ff8ead !important;
    white-space: nowrap;
    display: inline-block;
}

.mr-btn, .lyrics-btn { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; text-align: center; min-width: 60px; cursor: pointer; border: 1px solid var(--border-color); text-decoration: none; display: inline-block; }
.mr-btn { background: #ede3d5; color: var(--text-main); }
.mr-btn.find { 
    background: #f0f7f7 !important; 
    border: 1px solid #8eb9ff !important; 
    color: #4a7dff !important;      
}
.mr-btn.find:hover { 
    background: #e1efff !important; 
    color: #2b56ff !important; 
}
.lyrics-btn { background: transparent; color: var(--text-sub); }
.lyrics-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.copy-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-sub); border-radius: 10px; background: var(--bg-inner); margin-right: 10px; }

@media (max-width: 768px) {
    .navbar { padding: 0 20px; justify-content: center; }
    .nav-logo { font-size: 17px; }
    .nav-menu { display: none; }
    .menu-toggle { display: block; }
    .hero-desc { white-space: nowrap; font-size: 14px; }
    .mobile-btn-area { display: block; }
    .left-pane { position: fixed; top: 0; left: -340px; width: 300px; z-index: 1100; background: #fff; padding: 70px 20px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); height: 100vh; }
    .left-pane.open { left: 0; }
    .sidebar-close { display: block; }
    .song-info-tags, .mr-btn, .lyrics-btn { display: none !important; }
    .song { padding: 12px 15px; }
    .artist-name { flex: 1; font-size: 12px; }
    .song-title { flex: 1.5; font-size: 13px; }

    /* Hero hub mobile layout */
    .hero-hub { width: 100%; height: auto; flex-direction: column; gap: 0; }
    .hero-hub > .vp-icon { display: none; }
    .profile-img { width: 180px; height: 180px; }
    .hero-title { font-size: 26px; }
    .mobile-icon-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
    }
    .mobile-icon-grid .vp-icon { position: static; transform: none !important; }
    .mobile-icon-grid .vp-icon-face { width: 88px; padding: 12px 8px 10px; border-radius: 18px; animation: none !important; }
    .mobile-icon-grid .vp-icon-face img { width: 30px; height: 30px; }
    .mobile-icon-grid .vp-icon-face span { font-size: 10px; }
}

.modal { 
    display: none; position: fixed; inset: 0; 
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); 
    justify-content: center; align-items: center; z-index: 2000; 
}

.modal-content { 
    background: #fff; width: 92%; max-width: 550px; border-radius: 28px; 
    position: absolute; 
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
    cursor: grab; 
}
.modal-content:active { cursor: grabbing; }

.modal-header { 
    padding: 20px; color: var(--accent); font-weight: 800; 
    text-align: center; border-bottom: 1px solid var(--border-color); 
    user-select: none;
}
.modal-close { position: absolute; top: 18px; right: 20px; cursor: pointer; font-size: 22px; z-index: 10; }
.lyrics-body { padding: 40px 30px; max-height: 60vh; overflow-y: auto; text-align: center; }
#lyricsText { white-space: pre-wrap; font-size: 18px; line-height: 1.8; color: var(--text-main); margin: 0; font-weight: 400 !important; }

#ganadaContent { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; cursor: default; }
</style>
</head>
<body>

<main>
    <section id="home-page" class="page active">

                            <a href="https://discord.com/invite/Mn8zBq7nAb" target="_blank" class="vp-icon"><div class="vp-icon-face vp-discord"><img src="icon-discord.png" alt="Discord"><span>디스코드</span></div></a>
                            <a href="https://www.youtube.com/channel/UCbcDFqBnyJxdPFXeuUHiF1g" target="_blank" class="vp-icon"><div class="vp-icon-face vp-rewatch"><img src="icon-youtube-main.png" alt="다시보기"><span>다시보기 채널</span></div></a>
                            <a href="https://cafe.naver.com/yokoring03" target="_blank" class="vp-icon"><div class="vp-icon-face vp-cafe"><img src="icon-cafe.png" alt="카페"><span>코링 베이커리</span></div></a>
                        </div>
                    </div>

                    <!-- Orbital icons (desktop) -->
                    <a href="https://www.sooplive.co.kr/station/yokoring03" target="_blank" class="vp-icon vp-pos-top-left">
                        <div class="vp-icon-face vp-soop"><img src="icon-soop.png" alt="SOOP"><span>SOOP 방송국</span></div>
                    </a>
                    <a href="https://www.youtube.com/@%EC%9A%94%EC%BD%94%EB%A7%81" target="_blank" class="vp-icon vp-pos-left">
                        <div class="vp-icon-face vp-youtube"><img src="icon-youtube.png" alt="YouTube"><span>노래 유튜브</span></div>
                    </a>
                    <a href="https://www.youtube.com/channel/UCbcDFqBnyJxdPFXeuUHiF1g" target="_blank" class="vp-icon vp-pos-bottom-left">
                        <div class="vp-icon-face vp-rewatch"><img src="icon-youtube-main.png" alt="다시보기"><span>다시보기 채널</span></div>
                    </a>
                    <a href="https://cafe.naver.com/yokoring03" target="_blank" class="vp-icon vp-pos-top-right">
                        <div class="vp-icon-face vp-cafe"><img src="icon-cafe.png" alt="카페"><span>코링 베이커리</span></div>
                    </a>
                    <a href="https://discord.com/invite/Mn8zBq7nAb" target="_blank" class="vp-icon vp-pos-bottom-right">
                        <div class="vp-icon-face vp-discord"><img src="icon-discord.png" alt="Discord"><span>디스코드</span></div>
                    </a>

                </div>
            </div>
            <div class="latest-video">
                <h3 style="font-size: 18px; font-weight: 800; margin-bottom: 15px;">최신 업로드 영상</h3>
                <div class="video-grid">
                    <div class="video-wrap" onclick="loadYoutube(this, 'XgsKuphtdIU')"><img src="https://img.youtube.com/vi/XgsKuphtdIU/maxresdefault.jpg" class="yt-thumb"><div class="yt-play-btn">▶</div></div>
                    <div class="video-wrap" onclick="loadYoutube(this, 'lAbisQ9vZq0')"><img src="https://img.youtube.com/vi/lAbisQ9vZq0/maxresdefault.jpg" class="yt-thumb"><div class="yt-play-btn">▶</div></div>
                    <div class="video-wrap" onclick="loadYoutube(this, '-5Yh0FT7NvI')"><img src="https://img.youtube.com/vi/-5Yh0FT7NvI/maxresdefault.jpg" class="yt-thumb"><div class="yt-play-btn">▶</div></div>
                </div>
            </div>
        </div>
    </section>

    <section id="songbook-page" class="page">
        <div class="songbook-container">
            <div class="left-pane" id="sidebar">
                <span class="sidebar-close" onclick="toggleSidebar()">✕</span>
                <div class="glass-card">
                    <div id="tabs" class="tab-group"></div>
                    <div style="margin-top:15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <span style="font-size:10px; font-weight:800; color:var(--accent);">ARTISTS</span>
                            <button id="btnGanada" style="background:none; border:none; color:var(--text-sub); font-size:10px; cursor:pointer;">가나다 ⇅</button>
                        </div>
                        <div id="artistList"></div>
                    </div>
                </div>
                <div id="guide" class="glass-card"></div>
            </div>
            <div class="right-pane">
                <div class="list-header">
                    <input type="text" id="searchInput" placeholder="가수 또는 노래 제목 검색...">
                    <button onclick="remoteReload()" class="reset-btn">Widget ReStart</button>
                </div>
                <div id="list"></div>
            </div>
        </div>
    </section>
</main>

<div id="lyricsModal" class="modal">
    <div class="modal-content" id="dragTarget">
        <div class="modal-header">LYRICS</div>
        <span class="modal-close" onclick="closeM('lyricsModal')">✕</span>
        <div class="lyrics-body"><pre id="lyricsText"></pre></div>
    </div>
</div>

<div id="ganadaModal" class="modal">
    <div class="modal-content" id="ganadaContent">
        <div class="modal-header">가수 선택</div>
        <span class="modal-close" onclick="closeM('ganadaModal')">✕</span>
        <div id="ganadaList" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; max-height:400px; overflow-y:auto; padding:20px;"></div>
    </div>
</div>

<script>
// --- [UI Logic] ---
function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
    document.getElementById(p + '-page').classList.add('active');
    document.getElementById('btn-nav-' + p).classList.add('active');
    const mBtn = document.querySelector('.menu-toggle');
    if(mBtn) mBtn.style.display = (p === 'songbook' && window.innerWidth <= 768) ? 'block' : 'none';
    document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeM(id) { document.getElementById(id).style.display = 'none'; }

// --- [Firebase & Data] ---
const firebaseConfig = { apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk", authDomain: "yokoring-songbook.firebaseapp.com", databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com", projectId: "yokoring-songbook" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const SHEET_ID = '1bSs04gJ8HyVil5PM0TBAm-4c_BeAqbU7ENMZ2AQcUVI', SHEET_NAMES = ['사용설명서','K-POP','POP','J-POP','숙제곡','신곡'];
let currentSongs = [], currentArtist = '전체', lyricsList = [];

async function loadLyricsList() { try { const r = await fetch('data/lyrics_list.json'); lyricsList = await r.json(); } catch(e) {} }
function findLyricsFile(a, t) { const f = lyricsList.find(l => l.artist === a && l.title === t); return f ? f.file : null; }
async function fetchSheet(s) { const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(s)}`); const t = await r.text(); const j = JSON.parse(t.substring(47, t.length-2)); return j.table.rows.map(row => row.c); }

async function selectCategory(n, el) {
    document.querySelectorAll('.tab-group .tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
    const rows = await fetchSheet(n);
    currentSongs = rows.slice(1).map(r => {
        if (!r || !r[0] || !r[1]) return null;
        let ml = ''; if (r[5] && String(r[5].v||'').startsWith('http')) ml = String(r[5].v); else if (r[6] && String(r[6].v||'').startsWith('http')) ml = String(r[6].v);
        return { artist: String(r[0].v||''), title: String(r[1].v||''), key: r[2]?String(r[2].v||''):'', keyUp: r[3]?String(r[3].v||''):'', note: r[4]?String(r[4].v||''):'', mr: ml, lyricsFile: findLyricsFile(String(r[0].v||''), String(r[1].v||'')), filterArtist: String(r[0].v||'').split('(')[0].trim() };
    }).filter(s => s !== null);
    currentArtist = '전체'; renderArtistFilter(); renderSongList();
}

function selectAndScrollArtist(a) {
    if (currentArtist === a) { currentArtist = '전체'; } else { currentArtist = a; }
    renderArtistFilter(); renderSongList();
    const target = document.getElementById('art-btn-' + a);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderArtistFilter() {
    const m = {}; currentSongs.forEach(s => { m[s.filterArtist] = (m[s.filterArtist] || 0) + 1; });
    const sorted = Object.keys(m).sort((a,b) => m[b] - m[a]);
    const el = document.getElementById('artistList'); el.innerHTML = '';
    const all = document.createElement('div'); all.className = 'tab' + (currentArtist === '전체' ? ' active' : ''); all.textContent = 'ALL';
    all.onclick = () => { currentArtist = '전체'; renderArtistFilter(); renderSongList(); if(window.innerWidth <= 768) toggleSidebar(); };
    el.appendChild(all);
    sorted.forEach(a => {
        const b = document.createElement('div'); b.className = 'tab' + (currentArtist === a ? ' active' : ''); b.textContent = a; b.id = 'art-btn-' + a;
        b.onclick = () => { selectAndScrollArtist(a); if(window.innerWidth <= 768) toggleSidebar(); };
        el.appendChild(b);
    });
}

function renderSongList() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('list'); el.innerHTML = '';
    const f = currentSongs.filter(s => (currentArtist === '전체' || s.filterArtist === currentArtist) && (s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)));
    f.forEach(s => {
        const d = document.createElement('div'); d.className = 'song';
        const tags = `<div class="song-info-tags">${s.note ? `<span class="note-text">${s.note}</span>` : ''}${s.key ? `<span class="key-badge">${s.key}</span>` : ''}${s.keyUp ? `<span class="keyup-badge">${s.keyUp}</span>` : ''}</div>`;
        let mb = s.mr ? `<a class="mr-btn" href="${s.mr}" target="_blank" onclick="sendToWidget('${s.title.replace(/'/g,"\\'")}', '${s.artist.replace(/'/g,"\\'")}')">MR</a>` : `<a class="mr-btn find" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.title+' '+s.artist+' MR')}" target="_blank">MR 찾기</a>`;
        d.innerHTML = `<div class="copy-icon" onclick="copyText('${s.artist} - ${s.title}', this)">📋</div><div class="artist-name">${s.artist}</div><div class="song-title">${s.title}</div>${tags}${mb}<span class="lyrics-btn ${s.lyricsFile?'active':''}" onclick="showLyrics('${s.lyricsFile}')">LYRICS</span>`;
        el.appendChild(d);
    });
}

function sendToWidget(t, a) { db.ref('currentSong').set({ title: t, artist: a, timestamp: Date.now() }); }

function showLyrics(f) { 
    if(!f || f==='null') return; 
    fetch(`data/lyrics/${f}`).then(r=>r.text()).then(t=>{ 
        document.getElementById('lyricsText').textContent=t; 
        document.getElementById('lyricsModal').style.display='flex'; 
        resetDrag(); 
    }); 
}
function copyText(t, b) { navigator.clipboard.writeText(t).then(() => { const o = b.textContent; b.textContent = '✅'; setTimeout(() => b.textContent = o, 1000); }); }
function loadYoutube(el, id) { el.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="width:100%; height:100%; border:none; border-radius:15px; position:absolute; top:0; left:0;"></iframe>`; }

function remoteReload() { 
    db.ref('currentSong').remove();
    db.ref('command').set({ type: 'RELOAD', timestamp: Date.now() });
}

/* --- 드래그 로직 --- */
let isDragging = false, xOff = 0, yOff = 0, startX, startY;
const dragT = document.getElementById("dragTarget");

function resetDrag() { 
    xOff = 0; yOff = 0; 
    dragT.style.transform = `translate(-50%, -50%)`; 
}

dragT.addEventListener("mousedown", dStart); dragT.addEventListener("touchstart", dStart);
function dStart(e) {
    if (e.target.classList.contains('modal-close')) return;
    const cx = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
    const cy = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
    startX = cx - xOff; startY = cy - yOff;
    isDragging = true;
}
function dMove(e) {
    if (isDragging) {
        e.preventDefault();
        const cx = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
        const cy = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
        xOff = cx - startX; yOff = cy - startY;
        dragT.style.transform = `translate(calc(-50% + ${xOff}px), calc(-50% + ${yOff}px))`;
    }
}
document.addEventListener("mousemove", dMove); document.addEventListener("mouseup", () => isDragging = false);
document.addEventListener("touchmove", dMove, {passive: false}); document.addEventListener("touchend", () => isDragging = false);

document.getElementById('btnGanada').onclick = () => {
    const list = document.getElementById('ganadaList'); list.innerHTML = ''; const map = {}; currentSongs.forEach(s => { map[s.filterArtist] = 1; });
    Object.keys(map).sort((a,b) => a.localeCompare(b,'ko')).forEach(a => { 
        const b = document.createElement('div'); b.className = 'tab'; b.style.textAlign = 'center'; b.textContent = a; 
        b.onclick = () => { selectAndScrollArtist(a); closeM('ganadaModal'); if(window.innerWidth <= 768) toggleSidebar(); }; 
        list.appendChild(b); 
    });
    document.getElementById('ganadaModal').style.display = 'flex';
};

document.getElementById('searchInput').oninput = () => renderSongList();
(async () => {
    await loadLyricsList(); const tbs = document.getElementById('tabs');
    SHEET_NAMES.slice(1).forEach(n => { const tb = document.createElement('div'); tb.className='tab'; tb.textContent=n; tb.onclick=()=>selectCategory(n, tb); tbs.appendChild(tb); });
    const gR = await fetchSheet('사용설명서'); document.getElementById('guide').innerHTML = gR.map(r=>r?r[0]?.v||'':'').join('<br>');
    tbs.firstChild.click(); showPage('home');
})();
</script>
</body>
</html>
