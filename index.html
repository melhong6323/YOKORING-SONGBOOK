<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>요코링 홈 & 노래책</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root {
    /* 기존 테마 색상 */
    --bg-yogurt-cream: #FFFAFA;      
    --bg-yogurt-strawberry: #FFE6EA; 
    --bg-card: #ffffff;      
    --bg-inner: #FFF1F3;      
    --accent: #ff8ead;       
    --accent-soft: rgba(255, 142, 173, 0.1);
    --border-color: rgba(93, 60, 67, 0.05);
    --text-main: #5D3C43;    
    --text-sub: #9A8A8C;     
    --nav-height: 70px;
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body {
    margin: 0; font-family: 'Pretendard', sans-serif;
    background: linear-gradient(135deg, var(--bg-yogurt-cream) 0%, var(--bg-yogurt-strawberry) 100%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.5s ease;
}

/* --- Navigation --- */
.navbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 40px; height: var(--nav-height);
    background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px);
    position: fixed; top: 0; width: 100%; z-index: 1000;
    border-bottom: 1px solid var(--border-color);
}
.nav-logo { font-size: 20px; font-weight: 800; color: var(--text-main); }
.nav-logo span { color: var(--accent); }
.nav-menu { display: flex; gap: 20px; }
.nav-item { 
    font-weight: 700; font-size: 15px; cursor: pointer; color: var(--text-sub); 
    padding: 8px 16px; border-radius: 10px; transition: 0.3s;
}
.nav-item.active { color: var(--accent); background: var(--accent-soft); }

/* --- Content Layout --- */
main { margin-top: var(--nav-height); height: calc(100vh - var(--nav-height)); overflow-y: auto; }
.page { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; height: 100%; }
.page.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- [1] Home Page Styles --- */
.home-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; padding-bottom: 40px; }

/* --- 세련된 메인 화면 (Glassmorphism + Mesh Gradient) --- */
.hero-section {
    position: relative; 
    padding: 80px 20px; 
    text-align: center; 
    border-radius: 30px; 
    overflow: hidden;
    background: 
        radial-gradient(circle at 15% 50%, rgba(255, 179, 186, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(255, 223, 186, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(255, 241, 243, 0.8) 0%, transparent 50%),
        linear-gradient(135deg, #ffffff 0%, #FFF1F3 100%);
    box-shadow: 0 15px 35px rgba(93, 60, 67, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.8);
}
.hero-content { 
    position: relative; 
    z-index: 1; 
    display: inline-block;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 40px 60px;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 10px 30px rgba(93, 60, 67, 0.08);
}
.profile-img { 
    width: 150px; height: 150px; border-radius: 50%; 
    border: 4px solid #fff; 
    box-shadow: 0 8px 20px rgba(255, 142, 173, 0.2); 
    margin: 0 auto 20px auto;
    background: #fff url('yoko-profile.png') center/cover;
}
.hero-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; color: var(--text-main); }

.quick-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }

/* 아이콘과 텍스트가 나란히 오도록 flex 적용 */
.link-card {
    background: #fff; padding: 15px; border-radius: 18px; 
    text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 14px;
    border: 1px solid var(--border-color); transition: 0.3s; 
    display: flex; align-items: center; justify-content: center; gap: 8px; /* 중앙 정렬 및 간격 */
}
.link-card:hover { transform: translateY(-5px); border-color: var(--accent); color: var(--accent); box-shadow: 0 5px 15px rgba(93, 60, 67, 0.05); }

/* 아이콘 크기 고정 */
.link-icon {
    width: 22px; 
    height: 22px; 
    object-fit: contain;
}

.cta-box { text-align: center; padding: 40px 0; }
.btn-go-songbook {
    padding: 18px 45px; font-size: 18px; font-weight: 800; border-radius: 50px; cursor: pointer; border: none;
    background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(255, 142, 173, 0.3); transition: 0.3s;
}
.btn-go-songbook:hover { transform: scale(1.05); }

.latest-video { background: var(--bg-card); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); }
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}
.video-wrap { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; }
.video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

/* --- [2] Songbook Page Styles (기존 기능 CSS 그대로 복원) --- */
.songbook-container { display: flex; gap: 20px; max-width: 1500px; margin: 0 auto; height: 100%; padding-bottom: 20px; }
.left-pane { flex: 0 0 320px; display: flex; flex-direction: column; gap: 16px; height: 100%; }
.right-pane { flex: 1; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(93, 60, 67, 0.05); }
.glass-card { background: var(--bg-card); border-radius: 20px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(93, 60, 67, 0.03); }

.tab-group { display: flex; flex-wrap: wrap; gap: 6px; }
.tab { padding: 7px 12px; border-radius: 10px; background: var(--bg-inner); color: var(--text-sub); cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; border: 1px solid transparent; }
.tab.active { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }

#artistList { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 250px; overflow-y: auto; padding-right: 4px; scroll-behavior: smooth; }
#artistList .tab { text-align: center; font-size: 11px; padding: 6px 2px; }

.list-header { padding: 15px 20px; background: rgba(255, 255, 255, 0.5); display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border-color); }
#searchInput { flex: 1; background: var(--bg-inner); border: 1.5px solid var(--border-color); border-radius: 14px; padding: 12px 18px; color: var(--text-main); font-size: 14px; outline: none; }
#searchInput::placeholder { color: var(--text-sub); opacity: 0.6; }
.reset-btn { flex-shrink: 0; height: 45px; padding: 0 15px; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); border-radius: 14px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; }
.reset-btn:hover { background: var(--accent); color: white; }

#list { flex: 1; overflow-y: auto; background: var(--bg-card); position: relative; }
.song { display: flex; align-items: center; padding: 14px 20px; gap: 12px; border-bottom: 1px solid rgba(93, 60, 67, 0.04); transition: 0.2s; }
.song:hover { background: var(--bg-inner); }
.song.selected { background: var(--accent-soft); }

.song-info-tags { display: flex; gap: 6px; align-items: center; margin-right: 12px; flex-shrink: 0; }
.key-badge { font-size: 10px; background: #f0ede5; color: var(--text-sub); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-color); }
.keyup-badge { font-size: 10px; background: var(--accent-soft); color: var(--accent); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--accent); }
.note-text { font-size: 11px; color: var(--accent); font-weight: 600; opacity: 0.9; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.copy-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-sub); border-radius: 10px; background: var(--bg-inner); border: 1px solid var(--border-color); }
.artist-name { flex: 1; font-weight: 600; color: var(--text-sub); font-size: 13px; }
.song-title { flex: 2; color: var(--text-main); font-size: 14px; font-weight: 500; }
.mr-btn, .lyrics-btn { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; text-decoration: none; text-align: center; min-width: 60px; }
.mr-btn { background: #ede3d5; color: var(--text-main); border: 1px solid var(--border-color); }
.lyrics-btn { background: transparent; color: var(--text-sub); border: 1px solid var(--border-color); cursor: pointer; }
.lyrics-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.disabled { opacity: 0.2; pointer-events: none; }

/* Modal & Lyrics Font */
.modal { display: none; position: fixed; inset: 0; background: rgba(93, 60, 67, 0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 2000; }
.modal-content { background: var(--bg-card); width: 92%; max-width: 550px; border-radius: 28px; border: 1px solid var(--border-color); position: absolute; overflow: hidden; box-shadow: 0 30px 60px rgba(93, 60, 67, 0.2); }
.modal-header { padding: 20px; color: var(--accent); font-weight: 800; cursor: move; text-align: center; border-bottom: 1px solid var(--border-color); letter-spacing: 1px; }
.modal-close { position: absolute; top: 18px; right: 20px; cursor: pointer; color: var(--text-sub); font-size: 22px; transition: 0.2s; }
.lyrics-body { padding: 40px 30px; max-height: 65vh; overflow-y: auto; text-align: center; }
#lyricsText { white-space: pre-wrap; color: var(--text-main); font-family: 'Pretendard', sans-serif !important; font-size: 18px; line-height: 1.8; letter-spacing: -0.5px; font-weight: 400; margin: 0; }
#guide { flex: 1; overflow-y: auto; font-size: 12px; color: var(--text-sub); line-height: 1.7; padding: 20px; }
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">요코링 <span>Yokoring</span></div>
    <div class="nav-menu">
        <div class="nav-item active" id="btn-nav-home" onclick="showPage('home')">홈</div>
        <div class="nav-item" id="btn-nav-songbook" onclick="showPage('songbook')">노래책</div>
    </div>
</nav>

<main>
    <section id="home-page" class="page active">
        <div class="home-container">
            <div class="hero-section">
                <div class="hero-content">
                    <div class="profile-img"></div>
                    <h1 class="hero-title">요코링 Yokoring</h1>
                    <p style="font-weight: 600; opacity: 0.8; color: var(--text-main);">코링이와 넙치의 놀이터입니다.</p>
                </div>
            </div>

            <div class="quick-links">
                <a href="https://www.sooplive.co.kr/station/yokoring03" target="_blank" class="link-card" style="border-color: #a5dff9;">
                    <img src="icon-soop.png" alt="SOOP" class="link-icon"> SOOP 방송국
                </a>
                
                <a href="https://www.youtube.com/@%EC%9A%94%EC%BD%94%EB%A7%81" target="_blank" class="link-card" style="border-color: #ffcccc;">
                    <img src="icon-youtube.png" alt="YouTube" class="link-icon"> 노래 유튜브
                </a>
                
                <a href="https://www.youtube.com/channel/UCbcDFqBnyJxdPFXeuUHiF1g" target="_blank" class="link-card" style="border-color: #eee;">
                    <img src="icon-youtube.png" alt="Replay" class="link-icon"> 다시보기 채널

                <a href="https://cafe.naver.com/yokoring03" target="_blank" class="link-card" style="border-color: #c3eec3;">
                    <img src="icon-cafe.png" alt="Cafe" class="link-icon"> 코링 베이커리
                </a>
                
                <a href="https://discord.com/invite/Mn8zBq7nAb" target="_blank" class="link-card" style="border-color: #d1d9ff;">
                    <img src="icon-discord.png" alt="Discord" class="link-icon"> 디스코드
                </a>

            <div class="latest-video">
                <h3 style="font-size: 18px; font-weight: 800; margin-bottom: 10px;">최신 업로드 영상</h3>
    
                <div class="video-grid">
        
                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/sueWEqdFt8w" allowfullscreen></iframe>
                    </div>

                    <div class="video-wrap">
                        <iframe src="https://www.youtube.com/embed/lAbisQ9vZq0" allowfullscreen></iframe>

                        <iframe src="https://www.youtube.com/embed/OlBL88RrnYU" allowfullscreen></iframe>

    <section id="songbook-page" class="page">
        <div class="songbook-container">
            <div class="left-pane">
                <div class="glass-card">
                    <div id="tabs" class="tab-group"></div>
                    <div style="margin-top: 15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding: 0 4px;">
                            <span style="font-size:10px; font-weight:800; color:var(--accent);">ARTISTS</span>
                            <button id="btnGanada" style="background:none; border:none; color:var(--text-sub); font-size:10px; cursor:pointer;">가나다 ⇅</button>
                        </div>
                        <div id="artistList"></div>

                <div id="guide" class="glass-card"></div>

            <div class="right-pane">

</main>

<div id="lyricsModal" class="modal"><div class="modal-content" id="dragTarget"><div class="modal-header">LYRICS</div><span id="modalClose" class="modal-close">✕</span><div class="lyrics-body"><pre id="lyricsText"></pre></div></div></div>
<div id="ganadaModal" class="modal"><div class="modal-content" id="ganadaContent" style="position:relative; transform:none; margin:auto;"><div class="modal-header">가수 선택</div><span id="ganadaClose" class="modal-close">✕</span><div id="ganadaList" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; max-height:400px; overflow-y:auto; padding:20px;"></div></div></div>

<script>
// --- [Page Control] ---
function showPage(pageName) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById(pageName + '-page').classList.add('active');
    document.getElementById('btn-nav-' + pageName).classList.add('active');
}

// --- [Firebase Config] ---
const firebaseConfig = {
    apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
    authDomain: "yokoring-songbook.firebaseapp.com",
    databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
    projectId: "yokoring-songbook"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SHEET_ID='1bSs04gJ8HyVil5PM0TBAm-4c_BeAqbU7ENMZ2AQcUVI'; 
const SHEET_NAMES=['사용설명서','K-POP','POP','J-POP','숙제곡','신곡'];
let currentSongs=[], currentArtist='전체', lyricsList=[];

async function loadLyricsList(){ try { const res = await fetch('data/lyrics_list.json'); lyricsList = await res.json(); } catch(e) {} }
function findLyricsFile(artist, title){ const found = lyricsList.find(l => l.artist === artist && l.title === title); return found ? found.file : null; }
async function fetchSheet(sheetName){ 
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=0&sheet=${encodeURIComponent(sheetName)}`); 
    const text=await res.text(); 
    const json=JSON.parse(text.substring(47,text.length-2)); 
    return json.table.rows.map(r => r.c); 
}

async function selectCategory(name, tabEl){
    document.querySelectorAll('.tab-group .tab').forEach(t=>t.classList.remove('active')); tabEl.classList.add('active');
    const rows = await fetchSheet(name);
    currentSongs = rows.slice(1).map(r => {
        if(!r || !r[0] || !r[1]) return null;
        let mrLink = ''; if (r[6] && String(r[6].v || '').startsWith('http')) mrLink = String(r[6].v); else if (r[5] && String(r[5].v || '').startsWith('http')) mrLink = String(r[5].v);
        const artist = String(r[0].v || ''), title = String(r[1].v || ''), key = r[2] ? String(r[2].v || '') : '', keyUp = r[3] ? String(r[3].v || '') : '', note = r[4] ? String(r[4].v || '') : '';
        return { artist, title, key, keyUp, note, mr: mrLink, lyricsFile: findLyricsFile(artist, title), filterArtist: artist.split('(')[0].trim() };
    }).filter(s => s !== null);
    currentArtist='전체'; renderArtistFilter(); renderSongList();
    document.getElementById('artistList').scrollTop = 0; 
}

function renderArtistFilter(){
    const map={}; currentSongs.forEach(s=>{ map[s.filterArtist]=(map[s.filterArtist]||0)+1; });
    const sorted = Object.keys(map).sort((a,b)=>map[b]-map[a]);
    const listEl = document.getElementById('artistList'); listEl.innerHTML = '';
    const allBtn = document.createElement('div'); allBtn.className = 'tab' + (currentArtist==='전체'?' active':'');
    allBtn.textContent = `ALL`; allBtn.onclick = () => { currentArtist='전체'; renderArtistFilter(); renderSongList(); listEl.scrollTop = 0; };
    listEl.appendChild(allBtn);
    sorted.forEach(a => {
        const btn = document.createElement('div'); btn.className = 'tab' + (currentArtist===a?' active':'');
        btn.textContent = a; btn.id = 'artist-btn-' + a;
        btn.onclick = () => { if(currentArtist === a) { currentArtist = '전체'; renderArtistFilter(); renderSongList(); listEl.scrollTop = 0; } else { selectAndScrollArtist(a); } };
        listEl.appendChild(btn);
    });
}

function renderSongList(){
    const query = document.getElementById('searchInput').value.toLowerCase();
    const listEl = document.getElementById('list'); listEl.innerHTML = '';
    const filtered = currentSongs.filter(s => (currentArtist==='전체' || s.filterArtist===currentArtist) && (s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query)));
    
    filtered.forEach(s => {
        const div = document.createElement('div'); div.className = 'song';
        const escapedTitle = s.title.replace(/'/g, "\\'");
        const escapedArtist = s.artist.replace(/'/g, "\\'");
        
        const infoTags = `<div class="song-info-tags">
            ${s.note ? `<span class="note-text">${s.note}</span>` : ''}
            ${s.key ? `<span class="key-badge">${s.key}</span>` : ''}
            ${s.keyUp ? `<span class="keyup-badge">${s.keyUp}</span>` : ''}
        </div>`;

        const mrBtn = s.mr ? `<a class="mr-btn" href="${s.mr}" target="_blank" onclick="sendToWidget('${escapedTitle}', '${escapedArtist}')">MR</a>` : `<span class="mr-btn disabled">MR</span>`;
        const lyBtnClass = s.lyricsFile ? 'lyrics-btn active' : 'lyrics-btn disabled';
        
        div.innerHTML = `<div class="copy-icon" onclick="copyText('${s.artist}-${s.title}', this); event.stopPropagation();">📋</div><div class="artist-name">${s.artist}</div><div class="song-title">${s.title}</div>${infoTags}${mrBtn}<span class="${lyBtnClass}" onclick="showLyrics('${s.lyricsFile}')">LYRICS</span>`;
        div.onclick = () => { document.querySelectorAll('.song').forEach(x=>x.classList.remove('selected')); div.classList.add('selected'); };
        listEl.appendChild(div);
    });
}

function sendToWidget(title, artist) { db.ref('currentSong').set({ title: title, artist: artist, timestamp: Date.now() }); }
function remoteReload() { if(confirm("방송 위젯을 새로고침 하시겠습니까?")) { db.ref('currentSong').remove(); db.ref('command').set({ type: 'RELOAD', timestamp: Date.now() }); } }
function selectAndScrollArtist(a) { currentArtist = a; renderArtistFilter(); renderSongList(); const targetBtn = document.getElementById('artist-btn-' + a); if(targetBtn) targetBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

function showLyrics(file){
    if(!file || file === 'null') return;
    fetch(`data/lyrics/${file}`).then(r => r.text()).then(t => {
        document.getElementById('lyricsText').textContent = t;
        const modal = document.getElementById('lyricsModal'); const content = document.getElementById('dragTarget');
        content.style.top = "50%"; content.style.left = "50%"; content.style.transform = "translate(-50%, -50%)";
        xOffset = 0; yOffset = 0; modal.style.display = 'flex';
    });
}

function copyText(txt, btn){ navigator.clipboard.writeText(txt).then(() => { const original = btn.textContent; btn.textContent='✅'; setTimeout(()=>btn.textContent=original, 1000); }); }

// 모달 드래그 기능
let isDragging = false, xOffset = 0, yOffset = 0, initialX, initialY;
const dragTarget = document.getElementById("dragTarget"); const modalHeader = document.querySelector(".modal-header");
modalHeader.addEventListener("mousedown", dragStart); modalHeader.addEventListener("touchstart", dragStart);
function dragStart(e) { initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset; initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset; isDragging = true; }
function drag(e) { if (isDragging) { e.preventDefault(); const currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX; const currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY; xOffset = currentX; yOffset = currentY; dragTarget.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`; } }
document.addEventListener("mousemove", drag); document.addEventListener("mouseup", () => isDragging = false);
document.addEventListener("touchmove", drag, {passive: false}); document.addEventListener("touchend", () => isDragging = false);

document.getElementById('modalClose').onclick=()=>document.getElementById('lyricsModal').style.display='none';
document.getElementById('ganadaClose').onclick=()=>document.getElementById('ganadaModal').style.display='none';

document.getElementById('btnGanada').onclick = () => {
    const list = document.getElementById('ganadaList'); list.innerHTML = ''; const map={};
    currentSongs.forEach(s=>{ map[s.filterArtist]=1; });
    Object.keys(map).sort((a,b)=>a.localeCompare(b,'ko')).forEach(a => {
        const b = document.createElement('div'); b.className='tab'; b.style.textAlign='center'; b.textContent=a;
        b.onclick=()=>{ selectAndScrollArtist(a); document.getElementById('ganadaModal').style.display='none'; };
        list.appendChild(b);
    });
    document.getElementById('ganadaModal').style.display='flex';
};

window.onclick=(e)=>{ if(e.target.classList.contains('modal')) e.target.style.display='none'; };
document.getElementById('searchInput').oninput=()=>renderSongList();

// 페이지 초기화 및 데이터 로드
(async()=>{
    await loadLyricsList(); const tabs = document.getElementById('tabs');
    SHEET_NAMES.slice(1).forEach(name => { const t = document.createElement('div'); t.className='tab'; t.textContent=name; t.onclick=()=>selectCategory(name, t); tabs.appendChild(t); });
    const guideRows = await fetchSheet('사용설명서');
    document.getElementById('guide').innerHTML = guideRows.map(r=>r?r[0]?.v||'':'').join('<br>');
    tabs.firstChild.click();
})();
</script>
