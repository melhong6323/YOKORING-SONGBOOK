<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YOKORING Song Widget</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            /* 1. 3월의 산뜻함을 담은 화사한 핑크 */
            --spring-pink: #ff8ab4; 
            --deep-pink: #ff6b9d;
            
            /* 2. 가독성을 위해 불투명도를 높인(0.85) 그라데이션 배경 */
            --widget-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 225, 240, 0.85) 100%);
            
            /* 3. 테두리: 은은한 핑크색 윤곽 */
            --border-light: rgba(255, 255, 255, 0.9);
            --border-pink: rgba(255, 138, 180, 0.4);
            
            /* 4. 가독성을 고려한 다크 웜 브라운 */
            --text-main: #3d2b2b; 
            --text-sub: #7a5f5f;
        }

        body {
            margin: 0; background: transparent; font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        #widget-card {
            display: flex; align-items: center; width: 350px; height: 84px; padding: 0 18px;
            background: var(--widget-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 42px; 
            box-sizing: border-box; 
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            
            border: 1px solid var(--border-light);
            outline: 2px solid var(--border-pink); 
            
            box-shadow: 
                0 10px 35px rgba(255, 138, 180, 0.2),
                0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .app-icon-area {
            flex-shrink: 0; width: 52px; height: 52px;
            background: linear-gradient(135deg, #ffffff 0%, #ffeaf2 100%);
            border-radius: 16px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 12px rgba(255, 138, 180, 0.15); margin-right: 14px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .app-icon-area img { width: 80%; height: 80%; object-fit: contain; }

        .info-area { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; margin-right: 5px; }
        
        .status-badge { 
            font-size: 9px; font-weight: 900; color: var(--deep-pink);
            letter-spacing: 1px; margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(255, 138, 180, 0.3);
        }

        .title-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
        
        .song-title { 
            margin: 0; font-size: 18px; font-weight: 800; color: var(--text-main); 
            display: inline-block; letter-spacing: -0.4px;
        }

        .marquee { animation: marquee 10s linear infinite; padding-left: 40px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .artist-name { 
            margin: 1px 0 0 0; font-size: 12px; font-weight: 600; color: var(--text-sub);
        }

        /* 컨트롤 영역 (스태빌라이저 제거 및 발바닥 컨테이너 추가) */
        .right-controls { flex-shrink: 0; display: flex; align-items: center; margin-left: 5px; }
        
        /* 🐾 고양이 발바닥 (Paw) 전체 컨테이너 */
        .paw-container {
            position: relative;
            width: 60px;
            height: 52px; /* 위젯 안쪽에 쏙 들어가는 크기 */
        }

        /* 🐾 작은 발가락 버튼 (이전, 정지, 다음) */
        .toe-bean {
            position: absolute;
            width: 16px; height: 16px;
            background: rgba(255, 138, 180, 0.85); /* 기존 핑크톤에 맞춤 */
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 7px; color: #fff;
            box-shadow: 0 2px 6px rgba(255, 138, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .left-toe { top: 7px; left: 1px; transform: rotate(-20deg); }
        .center-toe { top: 0px; left: 50%; transform: translateX(-50%); }
        .right-toe { top: 7px; right: 1px; transform: rotate(20deg); }

        /* 🐾 메인 패드 (재생 버튼) */
        .btn-play-circle {
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 32px; height: 32px; border-radius: 50%; 
            background: rgba(255, 138, 180, 0.95); 
            display: flex; justify-content: center; align-items: center;
            font-size: 11px; color: #fff; 
            box-shadow: 0 4px 12px rgba(255, 138, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 2; /* 파동 효과보다 위에 위치하도록 설정 */
        }

        /* ✨ 재생 버튼 파동 (Pulse Ripple) 효과 */
        .btn-play-circle::before,
        .btn-play-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--spring-pink);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            /* 위젯 테두리를 벗어나지 않도록 scale을 1.8로 제한하여 깔끔하게 처리 */
            animation: pulse-ripple 2s infinite ease-out;
        }
        .btn-play-circle::after {
            animation-delay: 1s; /* 두 개의 파동이 교차로 퍼지게 설정 */
        }

        @keyframes pulse-ripple {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        /* 대기 상태 투명도 및 컨트롤 색상 회색 처리 */
        #widget-card.standby { opacity: 0.9; transform: scale(0.98); outline-color: rgba(255, 138, 180, 0.1); }
        #widget-card.standby .btn-play-circle { background: #e0e0e0; box-shadow: none; color: #fff; border: none;}
        #widget-card.standby .toe-bean { background: #e0e0e0; box-shadow: none; color: #fff; border: none;}
        
        /* 대기 상태일 때는 파동 애니메이션 정지 및 숨김 */
        #widget-card.standby .btn-play-circle::before,
        #widget-card.standby .btn-play-circle::after { animation: none; opacity: 0; }
    </style>
</head>
<body>
    <div id="widget-card" class="standby">
        <div class="app-icon-area"><img src="KoringSign.png" alt="App Logo"></div>
        <div class="info-area">
            <div class="status-badge" id="status">READY 🌸</div>
            <div class="title-container"><h1 class="song-title" id="title">YOKORING Player</h1></div>
            <p class="artist-name" id="artist">YOKORING</p>
        </div>
        
        <div class="right-controls">
            <div class="paw-container">
                <div class="toe-bean left-toe"><i class="fa-solid fa-backward-step"></i></div>
                <div class="toe-bean center-toe"><i class="fa-solid fa-stop"></i></div>
                <div class="toe-bean right-toe"><i class="fa-solid fa-forward-step"></i></div>
                
                <div class="btn-play-circle main-pad"><i class="fa-solid fa-play"></i></div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('widget-card');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const statusEl = document.getElementById('status');
        const pageLoadTime = Date.now();

        const firebaseConfig = {
            apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
            authDomain: "yokoring-songbook.firebaseapp.com",
            databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
            projectId: "yokoring-songbook"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('currentSong').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateWidget(data.title, data.artist);
            else resetToDefault();
        });

        db.ref('command').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.type === 'RELOAD' && data.timestamp > pageLoadTime) {
                location.reload(); 
            }
        });

        function updateWidget(title, artist) {
            card.style.opacity = "0";
            card.style.transform = "translateY(10px) scale(0.95)";
            setTimeout(() => {
                card.classList.remove('standby');
                statusEl.innerHTML = "NOW PLAYING 🎵";
                titleEl.innerText = title;
                artistEl.innerText = artist;
                titleEl.classList.remove('marquee');
                void titleEl.offsetWidth; 
                if (titleEl.scrollWidth > titleEl.parentElement.clientWidth) {
                    titleEl.classList.add('marquee');
                }
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500); 
        }

        function resetToDefault() {
            card.style.opacity = "0";
            setTimeout(() => {
                card.classList.add('standby');
                statusEl.innerHTML = "READY 🌸";
                titleEl.innerText = "YOKORING Player";
                artistEl.innerText = "요코링";
                titleEl.classList.remove('marquee');
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500);
        }
    </script>
</body>
</html>
