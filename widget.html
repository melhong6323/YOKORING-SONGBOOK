<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YOKORING Song Widget</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --spring-plum: #B06CB0;
            --deep-plum: #834888;
            
            --widget-bg: linear-gradient(135deg, rgba(245, 240, 255, 0.96) 0%, rgba(218, 200, 245, 0.92) 100%);
            
            --border-light: rgba(255, 255, 255, 0.92);
            --border-plum: rgba(160, 110, 200, 0.30);
            
            --text-main: #251535;
            --text-sub: #7A60A0;
        }

        body {
            margin: 0; background: transparent; font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        #widget-card {
            display: flex; align-items: center; width: 350px; height: 84px; padding: 0 18px;
            background: var(--widget-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 42px;
            box-sizing: border-box;
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow:
                0 10px 38px rgba(140, 90, 190, 0.22),
                0 4px 12px rgba(0, 0, 0, 0.04);
        }

        /* 그라디언트 테두리 — ::before 의사요소로 white→pink 경계선 */
        #widget-card::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 44px;
            background: linear-gradient(160deg, rgba(255,255,255,0.95) 0%, rgba(218, 200, 245, 0.92) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* 카드 shimmer 글로스 */
        #widget-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 42px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.13) 50%, transparent 80%);
            background-size: 200% 100%;
            background-position: -100% 0;
            animation: shimmerGloss 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmerGloss {
            0%       { background-position: -100% 0; }
            45%, 100% { background-position: 220% 0; }
        }

        /* 아이콘 영역 Vision Pro specular highlight */
        .app-icon-area {
            flex-shrink: 0; width: 52px; height: 52px;
            background: linear-gradient(135deg, #F8F4FF 0%, #EDD8F8 100%);
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 14px rgba(140, 90, 190, 0.14); margin-right: 14px;
            border: 1px solid rgba(255, 255, 255, 0.85);
        }
        .app-icon-area img { width: 80%; height: 80%; object-fit: contain; }

        .info-area { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; margin-right: 5px; }
        
        .status-badge { 
            font-size: 9px; font-weight: 900; color: var(--deep-plum);
            letter-spacing: 1px; margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(131, 72, 136, 0.2);
        }

        /* .title-container merged into paw section above */
        
        .song-title { 
            margin: 0; font-size: 18px; font-weight: 800; color: var(--text-main); 
            display: inline-block; letter-spacing: -0.4px;
        }

        .marquee { animation: marquee 10s linear infinite; padding-left: 40px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .artist-name { 
            margin: 1px 0 0 0; font-size: 12px; font-weight: 600; color: var(--text-sub);
        }

        .right-controls { flex-shrink: 0; display: flex; align-items: center; margin-left: 5px; }
        
        .paw-container {
            position: relative;
            width: 72px;
            height: 54px;
        }

        .toe-bean {
            position: absolute;
            width: 16px; height: 16px;
            background: rgba(160, 110, 200, 0.82);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 7px; color: #fff;
            box-shadow: 0 2px 8px rgba(140, 90, 190, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.62);
        }
        /* 4-toe arch: ⏮ [stop] [♡] ⏭ */
        .toe-1 { top: 14px; left: 0;   transform: rotate(-30deg); }  /* ⏮ backward */
        .toe-2 { top:  4px; left: 18px; transform: rotate(-10deg); } /* ⏹ stop */
        .toe-3 { top:  4px; right: 18px; transform: rotate(10deg); } /* ♡ heart */
        .toe-4 { top: 14px; right: 0;  transform: rotate(30deg); }   /* ⏭ forward */

        .btn-play-circle {
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255, 138, 180, 0.95);
            display: flex; justify-content: center; align-items: center;
            font-size: 11px; color: #fff;
            box-shadow: 0 4px 14px rgba(255, 138, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.52);
            z-index: 2;
        }

        .btn-play-circle::before,
        .btn-play-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--spring-pink);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-ripple 2s infinite ease-out;
        }
        .btn-play-circle::after { animation-delay: 1s; }

        @keyframes pulse-ripple {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        /* Standby 숨쉬기 애니메이션 */
        @keyframes standbyBreath {
            0%, 100% { opacity: 0.85; transform: scale(0.978); }
            50% { opacity: 0.96; transform: scale(0.992); }
        }
        #widget-card.standby { outline-color: rgba(160, 110, 200, 0.1); animation: standbyBreath 3.5s ease-in-out infinite; }
        #widget-card.standby .btn-play-circle { background: #C8C0D4; box-shadow: none; color: #fff; border: none; }
        #widget-card.standby .toe-bean { background: #C8C0D4; box-shadow: none; color: #fff; border: none; }
        #widget-card.standby .btn-play-circle::before,
        #widget-card.standby .btn-play-circle::after { animation: none; opacity: 0; }

        /* NOW PLAYING 라이브 도트 */
        .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--deep-pink);
            margin-right: 5px;
            vertical-align: middle;
            animation: liveBlink 1.5s ease-in-out infinite;
        }
        @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

        /* 마퀴 오른쪽 페이드 마스크 */
        .title-container {
            width: 100%; overflow: hidden; white-space: nowrap; position: relative;
            -webkit-mask-image: linear-gradient(to right, black 75%, transparent 100%);
            mask-image: linear-gradient(to right, black 75%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="widget-card" class="standby">
        <div class="app-icon-area"><img src="KoringSign.png" alt="App Logo"></div>
        <div class="info-area">
            <div class="status-badge" id="status">READY 🌸</div>
            <div class="title-container"><h1 class="song-title" id="title">YOKORING Player</h1></div>
            <p class="artist-name" id="artist">YOKORING</p>
        </div>
        
        <div class="right-controls">
            <div class="paw-container">
                <div class="toe-bean toe-1"><i class="fa-solid fa-backward-step"></i></div>
                <div class="toe-bean toe-2"><i class="fa-solid fa-stop"></i></div>
                <div class="toe-bean toe-3"><i class="fa-solid fa-heart"></i></div>
                <div class="toe-bean toe-4"><i class="fa-solid fa-forward-step"></i></div>
                <div class="btn-play-circle main-pad"><i class="fa-solid fa-play"></i></div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('widget-card');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const statusEl = document.getElementById('status');
        const playIconEl = document.querySelector('.btn-play-circle i'); 
        const pageLoadTime = Date.now();

        const firebaseConfig = {
            apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
            authDomain: "yokoring-songbook.firebaseapp.com",
            databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
            projectId: "yokoring-songbook"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('currentSong').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateWidget(data.title, data.artist);
            else resetToDefault();
        });

        db.ref('command').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.type === 'RELOAD' && data.timestamp > pageLoadTime) {
                location.reload(); 
            }
        });

        function updateWidget(title, artist) {
            card.style.opacity = "0";
            card.style.transform = "translateY(10px) scale(0.95)";
            setTimeout(() => {
                card.classList.remove('standby');
                statusEl.innerHTML = "<span class='live-dot'></span>NOW PLAYING 🎵";
                playIconEl.className = 'fa-solid fa-pause';
                titleEl.innerText = title;
                artistEl.innerText = artist;
                titleEl.classList.remove('marquee');
                void titleEl.offsetWidth; 
                if (titleEl.scrollWidth > titleEl.parentElement.clientWidth) {
                    titleEl.classList.add('marquee');
                }
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500); 
        }

        function resetToDefault() {
            card.style.opacity = "0";
            setTimeout(() => {
                card.classList.add('standby');
                statusEl.innerHTML = "READY 🌸";
                playIconEl.className = 'fa-solid fa-play';
                titleEl.innerText = "YOKORING Player";
                artistEl.innerText = "요코링";
                titleEl.classList.remove('marquee');
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500);
        }
    </script>
</body>
</html>
