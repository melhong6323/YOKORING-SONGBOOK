<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YOKORING Song Widget</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --spring-pink: #ff8ead;
            --deep-pink:   #ff6b95;
            --card-bg:     rgba(15, 14, 26, 0.88);
            --text-main:   #EDE8F8;
            --text-sub:    #9B92B3;
        }

        body {
            margin: 0; background: transparent; font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        body.monitor-mode {
            background: #0F0E1A;
        }

        /* 숨겨진 YouTube 플레이어 */
        #yt-hidden-player {
            position: fixed; top: -9999px; left: -9999px;
            width: 1px; height: 1px; visibility: hidden;
        }

        #widget-card {
            display: flex; align-items: center; width: 460px; min-height: 90px; padding: 14px 18px;
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 20px;
            box-sizing: border-box;
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow:
                0 0 0 1px rgba(255, 142, 173, 0.30),
                0 0 28px rgba(255, 142, 173, 0.18),
                0 8px 36px rgba(0, 0, 0, 0.65),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* 핑크 그라데이션 테두리 */
        #widget-card::before {
            content: '';
            position: absolute; inset: -1.5px;
            border-radius: 22px;
            background: linear-gradient(135deg,
                rgba(255, 142, 173, 0.75) 0%,
                rgba(255, 142, 173, 0.15) 45%,
                transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* 카드 shimmer 글로스 */
        #widget-card::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 20px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.08) 50%, transparent 80%);
            background-size: 200% 100%;
            background-position: -100% 0;
            animation: shimmerGloss 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmerGloss {
            0%        { background-position: -100% 0; }
            45%, 100% { background-position: 220% 0; }
        }

        /* 아이콘 영역 */
        .app-icon-area {
            flex-shrink: 0; width: 52px; height: 52px;
            background: rgba(255, 142, 173, 0.10);
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            align-self: flex-start; margin-top: 4px;
            box-shadow:
                0 0 0 1px rgba(255, 142, 173, 0.28),
                0 0 18px rgba(255, 142, 173, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            margin-right: 16px;
        }
        .app-icon-area img { width: 80%; height: 80%; object-fit: contain; }

        /* 메인 정보 영역 */
        .info-area {
            flex-grow: 1; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; gap: 2px;
        }

        /* 상태 + 범례 행 */
        .top-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px;
        }

        .status-badge {
            font-size: 10px; font-weight: 900; color: var(--spring-pink);
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 142, 173, 0.65), 0 0 22px rgba(255, 142, 173, 0.30);
        }

        /* 범례 */
        #widgetLegend {
            display: flex; gap: 6px; align-items: center;
        }
        .legend-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .legend-name {
            font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
        }
        .legend-item { display: flex; align-items: center; gap: 3px; }

        /* 3단 가사 레이아웃 */
        .lrc-prev, .lrc-next {
            font-size: 12px; font-weight: 500; color: rgba(155,146,179,0.50);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            min-height: 16px; line-height: 1.4;
            transition: color 0.3s ease, opacity 0.3s ease;
        }
        .lrc-current {
            font-size: 19px; font-weight: 800; letter-spacing: -0.3px;
            color: var(--lrc-color, var(--spring-pink));
            text-shadow: 0 0 14px var(--lrc-glow, rgba(255,142,173,0.55));
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            min-height: 26px; line-height: 1.35;
            transition: color 0.35s ease, text-shadow 0.35s ease;
        }
        /* 줄 전환 애니메이션 */
        .lrc-current.changing {
            animation: lrcFlash 0.25s ease;
        }
        @keyframes lrcFlash {
            0%   { opacity: 0.3; transform: translateY(4px); }
            100% { opacity: 1;   transform: translateY(0); }
        }

        /* Standby 숨쉬기 애니메이션 */
        @keyframes standbyBreath {
            0%, 100% { opacity: 0.85; transform: scale(0.978); }
            50%       { opacity: 0.96; transform: scale(0.992); }
        }
        #widget-card.standby { animation: standbyBreath 3.5s ease-in-out infinite; }
        #widget-card.standby {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 4px 20px rgba(0, 0, 0, 0.50);
        }
        #widget-card.standby .app-icon-area {
            background: rgba(30, 28, 46, 0.8);
            box-shadow: none;
        }

        /* NOW PLAYING 라이브 도트 */
        .live-dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: var(--deep-pink);
            margin-right: 5px; vertical-align: middle;
            box-shadow: 0 0 6px rgba(255, 107, 149, 0.7);
            animation: liveBlink 1.5s ease-in-out infinite;
        }
        @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    </style>
</head>
<body>
    <!-- 숨겨진 YouTube 플레이어 마운트 포인트 -->
    <div id="yt-hidden-player"></div>

    <div id="widget-card" class="standby">
        <div class="app-icon-area"><img src="KoringSign.png" alt="App Logo"></div>
        <div class="info-area">
            <div class="top-row">
                <div class="status-badge" id="status">READY 🌸</div>
                <div id="widgetLegend" style="display:none;"></div>
            </div>
            <div class="lrc-prev" id="lrcPrev"></div>
            <div class="lrc-current" id="lrcCurrent">YOKORING Player</div>
            <div class="lrc-next" id="lrcNext">요코링</div>
        </div>
    </div>

    <script>
        // ==========================================
        // FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
            authDomain: "yokoring-songbook.firebaseapp.com",
            databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
            projectId: "yokoring-songbook"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const pageLoadTime = Date.now();

        if (new URLSearchParams(window.location.search).get('monitor') === '1') {
            document.body.classList.add('monitor-mode');
        }

        // ==========================================
        // YOUTUBE IFRAME API
        // ==========================================
        let ytPlayer = null;
        let ytReady = false;

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-hidden-player', {
                height: '1', width: '1',
                playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
                events: { onReady: () => { ytReady = true; } }
            });
        };

        // ==========================================
        // LRC PARSER
        // ==========================================
        function parseLrc(text) {
            const colorMap = {};
            let offsetMs = 0;
            const lines = [];
            let hasMemberTag = false;

            text.split('\n').forEach(raw => {
                const colorMatch = raw.match(/^\[COLOR:([^:]+):([^\]]+)\]/i);
                if (colorMatch) { colorMap[colorMatch[1].trim()] = '#' + colorMatch[2].trim().replace(/^#/, ''); return; }

                const offsetMatch = raw.match(/^\[offset\s*:\s*(-?\d+)\]/i);
                if (offsetMatch) { offsetMs = parseInt(offsetMatch[1], 10); return; }

                const lineMatch = raw.match(/^\[(\d{2}):(\d{2})\.(\d{1,3})\](?:\[([^\]]*)\])?\s*(.*)/);
                if (lineMatch) {
                    const time = parseInt(lineMatch[1],10)*60 + parseFloat(lineMatch[2]+'.'+lineMatch[3]);
                    const member = lineMatch[4] ? lineMatch[4].trim() : '';
                    const lyric = lineMatch[5].trim();
                    if (member) hasMemberTag = true;
                    lines.push({ time, member, text: lyric });
                }
            });

            lines.sort((a,b) => a.time - b.time);
            return { lines, colorMap, offsetMs, isSolo: !hasMemberTag };
        }

        function getMemberColor(member, colorMap) {
            if (!member) return 'var(--spring-pink)';
            const members = member.split(',').map(m => m.trim());
            if (members.length > 1) return 'var(--spring-pink)';
            const key = 'yokoring_color_' + members[0];
            return localStorage.getItem(key) || colorMap[members[0]] || 'var(--spring-pink)';
        }

        function getMemberGlow(color) {
            if (!color || color.startsWith('var(')) return 'rgba(255,142,173,0.55)';
            // hex → rgba glow
            const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
            return `rgba(${r},${g},${b},0.55)`;
        }

        // ==========================================
        // BINARY SEARCH
        // ==========================================
        function binarySearchLrc(lines, t) {
            let lo = 0, hi = lines.length - 1, res = -1;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (lines[mid].time <= t) { res = mid; lo = mid + 1; } else { hi = mid - 1; }
            }
            return res;
        }

        // ==========================================
        // WIDGET STATE
        // ==========================================
        const card = document.getElementById('widget-card');
        const statusEl = document.getElementById('status');
        const lrcPrevEl = document.getElementById('lrcPrev');
        const lrcCurrentEl = document.getElementById('lrcCurrent');
        const lrcNextEl = document.getElementById('lrcNext');
        const legendEl = document.getElementById('widgetLegend');

        let lrcData = null;
        let lrcActiveIdx = -1;
        let syncRafId = null;

        function renderLegend(colorMap, isSolo) {
            if (isSolo || Object.keys(colorMap).length === 0) {
                legendEl.style.display = 'none'; return;
            }
            legendEl.innerHTML = '';
            Object.entries(colorMap).forEach(([name, hex]) => {
                const custom = localStorage.getItem('yokoring_color_' + name) || hex;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<span class="legend-dot" style="background:${custom}"></span><span class="legend-name" style="color:${custom}">${name}</span>`;
                legendEl.appendChild(item);
            });
            legendEl.style.display = 'flex';
        }

        function updateThreeLines(idx) {
            if (!lrcData) return;
            const { lines, colorMap } = lrcData;

            const prevLine = idx > 0 ? lines[idx - 1] : null;
            const curLine  = idx >= 0 ? lines[idx]     : null;
            const nextLine = idx >= 0 && idx < lines.length - 1 ? lines[idx + 1] : null;

            lrcPrevEl.textContent = prevLine
                ? (prevLine.member ? `[${prevLine.member}] ` : '') + (prevLine.text || '♪')
                : '';

            const newText = curLine
                ? (curLine.member ? `[${curLine.member}] ` : '') + (curLine.text || '♪')
                : 'YOKORING Player';

            if (lrcCurrentEl.textContent !== newText) {
                lrcCurrentEl.classList.remove('changing');
                void lrcCurrentEl.offsetWidth; // reflow
                lrcCurrentEl.classList.add('changing');
                lrcCurrentEl.textContent = newText;
                const color = curLine ? getMemberColor(curLine.member, colorMap) : 'var(--spring-pink)';
                lrcCurrentEl.style.setProperty('--lrc-color', color);
                lrcCurrentEl.style.setProperty('--lrc-glow', getMemberGlow(color));
            }

            lrcNextEl.textContent = nextLine
                ? (nextLine.member ? `[${nextLine.member}] ` : '') + (nextLine.text || '♪')
                : '';
        }

        function syncTick() {
            if (!lrcData || !ytPlayer || !ytReady || typeof ytPlayer.getCurrentTime !== 'function') {
                syncRafId = requestAnimationFrame(syncTick); return;
            }
            const state = ytPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                const t = ytPlayer.getCurrentTime() + lrcData.offsetMs / 1000;
                const idx = binarySearchLrc(lrcData.lines, t);
                if (idx !== lrcActiveIdx) {
                    lrcActiveIdx = idx;
                    updateThreeLines(idx);
                }
            }
            syncRafId = requestAnimationFrame(syncTick);
        }

        async function loadSong(songId, youtubeId, title, artist) {
            card.classList.remove('standby');
            statusEl.innerHTML = "<span class='live-dot'></span>NOW PLAYING 🎵";

            // 가사 파일 로드 (있을 때만)
            lrcData = null;
            lrcActiveIdx = -1;
            if (syncRafId) cancelAnimationFrame(syncRafId);

            if (songId) {
                try {
                    const r = await fetch(`data/lyrics/${songId}`);
                    if (r.ok) {
                        const parsed = parseLrc(await r.text());
                        if (parsed.lines.length > 0) {
                            lrcData = parsed;
                            renderLegend(lrcData.colorMap, lrcData.isSolo);
                            updateThreeLines(-1);
                        }
                    }
                } catch(e) {}
            }

            if (!lrcData) {
                // 가사 없음: title/artist 표시 모드
                legendEl.style.display = 'none';
                lrcPrevEl.textContent = '';
                lrcCurrentEl.textContent = title;
                lrcCurrentEl.style.setProperty('--lrc-color', 'var(--spring-pink)');
                lrcCurrentEl.style.setProperty('--lrc-glow', 'rgba(255,142,173,0.55)');
                lrcNextEl.textContent = artist;
            }

            // YouTube 플레이어에 영상 로드
            if (youtubeId && ytPlayer && ytReady) {
                ytPlayer.loadVideoById(youtubeId);
                syncRafId = requestAnimationFrame(syncTick);
            } else if (lrcData) {
                syncRafId = requestAnimationFrame(syncTick);
            }
        }

        function resetToDefault() {
            if (syncRafId) { cancelAnimationFrame(syncRafId); syncRafId = null; }
            if (ytPlayer && ytReady) ytPlayer.stopVideo();
            lrcData = null; lrcActiveIdx = -1;
            card.classList.add('standby');
            statusEl.innerHTML = "READY 🌸";
            legendEl.style.display = 'none';
            lrcPrevEl.textContent = '';
            lrcCurrentEl.textContent = 'YOKORING Player';
            lrcCurrentEl.style.setProperty('--lrc-color', 'var(--spring-pink)');
            lrcCurrentEl.style.setProperty('--lrc-glow', 'rgba(255,142,173,0.55)');
            lrcNextEl.textContent = '요코링';
        }

        // ==========================================
        // FIREBASE LISTENERS
        // ==========================================
        db.ref('currentSong').on('value', (snap) => {
            const d = snap.val();
            if (d && (d.title || d.song_id)) loadSong(d.song_id, d.youtubeId, d.title || '', d.artist || '');
            else resetToDefault();
        });

        db.ref('command').on('value', (snap) => {
            const d = snap.val();
            if (!d || d.timestamp <= pageLoadTime) return;
            if (!ytPlayer || !ytReady) return;
            if (d.type === 'PLAY') {
                ytPlayer.playVideo();
                if (lrcData) { syncRafId = requestAnimationFrame(syncTick); }
            } else if (d.type === 'PAUSE') {
                ytPlayer.pauseVideo();
            } else if (d.type === 'SEEK' && d.seekTo !== undefined) {
                ytPlayer.seekTo(d.seekTo, true);
            } else if (d.type === 'RELOAD') {
                location.reload();
            }
        });
    </script>
</body>
</html>
