<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YOKORING Song Widget - March Blossom</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            /* 1. 3월의 산뜻함을 담은 화사한 핑크 */
            --spring-pink: #ff8ab4; 
            --deep-pink: #ff6b9d;
            
            /* 2. 가독성을 위해 불투명도를 높인(0.85) 그라데이션 배경 */
            /* 완전 하얀색에서 아주 연한 분홍색으로 부드럽게 넘어갑니다. */
            --widget-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 225, 240, 0.85) 100%);
            
            /* 3. 테두리: 은은한 핑크색 윤곽 */
            --border-light: rgba(255, 255, 255, 0.9);
            --border-pink: rgba(255, 138, 180, 0.4);
            
            /* 4. 가독성을 고려한 다크 웜 브라운 */
            --text-main: #3d2b2b; 
            --text-sub: #7a5f5f;
        }

        body {
            margin: 0; background: transparent; font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        #widget-card {
            display: flex; align-items: center; width: 400px; height: 84px; padding: 0 18px;
            background: var(--widget-bg); 
            /* 블러 효과는 유지하여 고급스러움을 줍니다. */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 42px; 
            box-sizing: border-box; 
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            
            /* 이중 테두리로 확실한 존재감 부여 */
            border: 1px solid var(--border-light);
            outline: 2px solid var(--border-pink); /* 테두리를 조금 더 굵게 */
            
            /* 그림자: 핑크색 톤을 살려 화사하게 */
            box-shadow: 
                0 10px 35px rgba(255, 138, 180, 0.2),
                0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .app-icon-area {
            flex-shrink: 0; width: 52px; height: 52px;
            /* 아이콘 배경도 그라데이션으로 화사하게 */
            background: linear-gradient(135deg, #ffffff 0%, #ffeaf2 100%);
            border-radius: 16px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 12px rgba(255, 138, 180, 0.15); margin-right: 14px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .app-icon-area img { width: 80%; height: 80%; object-fit: contain; }

        .info-area { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; margin-right: 10px; }
        
        .status-badge { 
            font-size: 9px; font-weight: 900; color: var(--deep-pink); /* 글자색을 조금 더 진하게 */
            letter-spacing: 1px; margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(255, 138, 180, 0.3);
        }

        .title-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
        
        .song-title { 
            margin: 0; font-size: 18px; font-weight: 800; color: var(--text-main); 
            display: inline-block; letter-spacing: -0.4px;
        }

        .marquee { animation: marquee 10s linear infinite; padding-left: 40px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .artist-name { 
            margin: 1px 0 0 0; font-size: 12px; font-weight: 600; color: var(--text-sub);
        }

        .right-controls { flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
        .playback-btns { display: flex; align-items: center; gap: 7px; color: var(--text-sub); }
        .btn-icon { font-size: 12px; opacity: 0.5; }
        
        /* 재생 버튼: 진한 핑크색으로 포인트를 주어 시선을 끔 */
        .btn-play-circle {
            width: 32px; height: 32px; border-radius: 50%; 
            background: rgba(255, 138, 180, 0.9); /* 거의 불투명하게 */
            display: flex; justify-content: center; align-items: center;
            font-size: 11px; color: #fff; 
            box-shadow: 0 4px 12px rgba(255, 138, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 핑크 비주얼라이저 */
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 18px; padding-bottom: 2px; }
        .bar { width: 3.5px; background: var(--spring-pink); border-radius: 2px; animation: visualize 0.6s ease-in-out infinite alternate; }
        .bar:nth-child(1) { animation-delay: 0.0s; height: 30%; }
        .bar:nth-child(2) { animation-delay: 0.1s; height: 100%; }
        .bar:nth-child(3) { animation-delay: 0.2s; height: 60%; }

        @keyframes visualize { 0% { height: 4px; opacity: 0.5; } 100% { height: 18px; opacity: 1; } }

        /* 대기 상태 투명도도 높임 (0.8 -> 0.9) */
        #widget-card.standby { opacity: 0.9; transform: scale(0.98); outline-color: rgba(255, 138, 180, 0.1); }
        #widget-card.standby .bar { animation: none; height: 4px; opacity: 0.2; }
        #widget-card.standby .btn-play-circle { background: #e0e0e0; box-shadow: none; color: #fff; border: none;}
    </style>
</head>
<body>
    <div id="widget-card" class="standby">
        <div class="app-icon-area"><img src="KoringSign.png" alt="App Logo"></div>
        <div class="info-area">
            <div class="status-badge" id="status">READY 🌸</div>
            <div class="title-container"><h1 class="song-title" id="title">YOKORING Player</h1></div>
            <p class="artist-name" id="artist">YOKORING</p>
        </div>
        <div class="right-controls">
            <div class="playback-btns">
                <i class="fa-solid fa-backward-step btn-icon"></i>
                <div class="btn-play-circle"><i class="fa-solid fa-play"></i></div>
                <i class="fa-solid fa-forward-step btn-icon"></i>
            </div>
            <div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>
    </div>

    <script>
        const card = document.getElementById('widget-card');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const statusEl = document.getElementById('status');
        const pageLoadTime = Date.now();

        const firebaseConfig = {
            apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
            authDomain: "yokoring-songbook.firebaseapp.com",
            databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
            projectId: "yokoring-songbook"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('currentSong').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateWidget(data.title, data.artist);
            else resetToDefault();
        });

        db.ref('command').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.type === 'RELOAD' && data.timestamp > pageLoadTime) {
                location.reload(); 
            }
        });

        function updateWidget(title, artist) {
            card.style.opacity = "0";
            card.style.transform = "translateY(10px) scale(0.95)";
            setTimeout(() => {
                card.classList.remove('standby');
                statusEl.innerHTML = "NOW PLAYING 🎵";
                titleEl.innerText = title;
                artistEl.innerText = artist;
                titleEl.classList.remove('marquee');
                void titleEl.offsetWidth; 
                if (titleEl.scrollWidth > titleEl.parentElement.clientWidth) {
                    titleEl.classList.add('marquee');
                }
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500); 
        }

        function resetToDefault() {
            card.style.opacity = "0";
            setTimeout(() => {
                card.classList.add('standby');
                statusEl.innerHTML = "READY 🌸";
                titleEl.innerText = "YOKORING Player";
                artistEl.innerText = "요코링";
                titleEl.classList.remove('marquee');
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500);
        }
    </script>
</body>
</html>
