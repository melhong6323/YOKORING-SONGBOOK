<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YOKORING Song Widget</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --spring-pink: #ff8ead;
            --deep-pink:   #ff6b95;
            --card-bg:     rgba(15, 14, 26, 0.88);
            --text-main:   #EDE8F8;
            --text-sub:    #9B92B3;
        }

        body {
            margin: 0; background: transparent; font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        #widget-card {
            display: flex; align-items: center; width: 350px; height: 84px; padding: 0 18px;
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 42px;
            box-sizing: border-box;
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow:
                0 0 0 1px rgba(255, 142, 173, 0.30),
                0 0 28px rgba(255, 142, 173, 0.18),
                0 8px 36px rgba(0, 0, 0, 0.65),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* 핑크 그라데이션 테두리 */
        #widget-card::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 44px;
            background: linear-gradient(135deg,
                rgba(255, 142, 173, 0.75) 0%,
                rgba(255, 142, 173, 0.15) 45%,
                transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* 카드 shimmer 글로스 */
        #widget-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 42px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.08) 50%, transparent 80%);
            background-size: 200% 100%;
            background-position: -100% 0;
            animation: shimmerGloss 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmerGloss {
            0%        { background-position: -100% 0; }
            45%, 100% { background-position: 220% 0; }
        }

        /* 아이콘 영역 */
        .app-icon-area {
            flex-shrink: 0; width: 52px; height: 52px;
            background: rgba(255, 142, 173, 0.10);
            border-radius: 18px; display: flex; justify-content: center; align-items: center;
            box-shadow:
                0 0 0 1px rgba(255, 142, 173, 0.28),
                0 0 18px rgba(255, 142, 173, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            margin-right: 14px;
        }
        .app-icon-area img { width: 80%; height: 80%; object-fit: contain; }

        .info-area { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center; margin-right: 5px; }

        .status-badge {
            font-size: 10px; font-weight: 900; color: var(--spring-pink);
            letter-spacing: 1.5px; margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(255, 142, 173, 0.65), 0 0 22px rgba(255, 142, 173, 0.30);
        }

        .song-title {
            margin: 0; font-size: 18px; font-weight: 800; color: var(--text-main);
            display: inline-block; letter-spacing: -0.4px;
        }

        .marquee { animation: marquee 10s linear infinite; padding-left: 40px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .artist-name {
            margin: 1px 0 0 0; font-size: 12px; font-weight: 600; color: var(--text-sub);
        }

        .right-controls { flex-shrink: 0; display: flex; align-items: center; margin-left: 8px; }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .ctrl-btn {
            width: 22px; height: 22px;
            background: none;
            color: var(--text-sub);
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }

        .btn-play-circle {
            position: relative;
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--spring-pink);
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; color: #fff;
            box-shadow:
                0 0 0 2px rgba(255, 255, 255, 0.10),
                0 0 20px rgba(255, 142, 173, 0.70),
                0 0 42px rgba(255, 142, 173, 0.35),
                0 4px 16px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            z-index: 2;
        }

        .btn-play-circle::before,
        .btn-play-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: var(--spring-pink);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-ripple 2s infinite ease-out;
        }
        .btn-play-circle::after { animation-delay: 1s; }

        @keyframes pulse-ripple {
            0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
            100% { transform: translate(-50%, -50%) scale(2.0); opacity: 0; }
        }

        /* Standby 숨쉬기 애니메이션 */
        @keyframes standbyBreath {
            0%, 100% { opacity: 0.85; transform: scale(0.978); }
            50%       { opacity: 0.96; transform: scale(0.992); }
        }
        #widget-card.standby { animation: standbyBreath 3.5s ease-in-out infinite; }
        #widget-card.standby {
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 4px 20px rgba(0, 0, 0, 0.50);
        }
        #widget-card.standby .btn-play-circle {
            background: rgba(60, 58, 80, 0.85);
            box-shadow: none;
            color: rgba(255, 255, 255, 0.4);
        }
        #widget-card.standby .ctrl-btn {
            color: rgba(255, 255, 255, 0.18);
        }
        #widget-card.standby .app-icon-area {
            background: rgba(30, 28, 46, 0.8);
            box-shadow: none;
        }
        #widget-card.standby .btn-play-circle::before,
        #widget-card.standby .btn-play-circle::after { animation: none; opacity: 0; }

        /* NOW PLAYING 라이브 도트 */
        .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--deep-pink);
            margin-right: 5px;
            vertical-align: middle;
            box-shadow: 0 0 6px rgba(255, 107, 149, 0.7);
            animation: liveBlink 1.5s ease-in-out infinite;
        }
        @keyframes liveBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

        /* 마퀴 오른쪽 페이드 마스크 */
        .title-container {
            width: 100%; overflow: hidden; white-space: nowrap; position: relative;
            -webkit-mask-image: linear-gradient(to right, black 75%, transparent 100%);
            mask-image: linear-gradient(to right, black 75%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="widget-card" class="standby">
        <div class="app-icon-area"><img src="KoringSign.png" alt="App Logo"></div>
        <div class="info-area">
            <div class="status-badge" id="status">READY 🌸</div>
            <div class="title-container"><h1 class="song-title" id="title">YOKORING Player</h1></div>
            <p class="artist-name" id="artist">YOKORING</p>
        </div>
        
        <div class="right-controls">
            <div class="controls-bar">
                <div class="ctrl-btn"><i class="fa-solid fa-backward-step"></i></div>
                <div class="btn-play-circle main-pad"><i class="fa-solid fa-play"></i></div>
                <div class="ctrl-btn"><i class="fa-solid fa-forward-step"></i></div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('widget-card');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const statusEl = document.getElementById('status');
        const playIconEl = document.querySelector('.btn-play-circle i'); 
        const pageLoadTime = Date.now();

        const firebaseConfig = {
            apiKey: "AIzaSyDDSJWWYCzwmM8DSIYI4w3vGPKSshpFhGk",
            authDomain: "yokoring-songbook.firebaseapp.com",
            databaseURL: "https://yokoring-songbook-default-rtdb.firebaseio.com",
            projectId: "yokoring-songbook"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('currentSong').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateWidget(data.title, data.artist);
            else resetToDefault();
        });

        db.ref('command').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.type === 'RELOAD' && data.timestamp > pageLoadTime) {
                location.reload(); 
            }
        });

        function updateWidget(title, artist) {
            card.style.opacity = "0";
            card.style.transform = "translateY(10px) scale(0.95)";
            setTimeout(() => {
                card.classList.remove('standby');
                statusEl.innerHTML = "<span class='live-dot'></span>NOW PLAYING 🎵";
                playIconEl.className = 'fa-solid fa-pause';
                titleEl.innerText = title;
                artistEl.innerText = artist;
                titleEl.classList.remove('marquee');
                void titleEl.offsetWidth; 
                if (titleEl.scrollWidth > titleEl.parentElement.clientWidth) {
                    titleEl.classList.add('marquee');
                }
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500); 
        }

        function resetToDefault() {
            card.style.opacity = "0";
            setTimeout(() => {
                card.classList.add('standby');
                statusEl.innerHTML = "READY 🌸";
                playIconEl.className = 'fa-solid fa-play';
                titleEl.innerText = "YOKORING Player";
                artistEl.innerText = "요코링";
                titleEl.classList.remove('marquee');
                card.style.opacity = "1";
                card.style.transform = "translateY(0) scale(1)";
            }, 500);
        }
    </script>
</body>
</html>
